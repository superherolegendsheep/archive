<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>文章导入工具</title>
    <link rel="stylesheet" href="./assets/styles.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="admin-shell">
      <section class="admin-panel">
        <p class="eyebrow">Local Import</p>
        <h1>Markdown / HTML 文章导入工具</h1>
        <p class="muted">
          选择你的 Markdown 或 HTML 文件，填写信息后生成文章文件和清单片段。GitHub Pages
          是静态网站，所以这里会帮你把要提交到仓库的内容准备好。
        </p>

        <div class="form-grid">
          <label>
            标题
            <input id="post-title" type="text" placeholder="例如：雨夜札记" />
          </label>
          <label>
            日期
            <input id="post-date" type="date" />
          </label>
          <label>
            标签
            <input id="post-tags" type="text" placeholder="用逗号分隔，例如 小说, 随笔" />
          </label>
          <label>
            文件
            <input id="post-file" type="file" accept=".md,.markdown,.html,.htm,text/markdown,text/html" />
          </label>
        </div>

        <div class="admin-actions">
          <button id="build-post" type="button">生成仓库内容</button>
        </div>

        <section class="output-panel">
          <h2>1. 新文章文件</h2>
          <p class="muted">保存到 <code>posts/</code> 文件夹。</p>
          <textarea id="file-output" readonly></textarea>
          <button id="download-post" type="button">下载文章文件</button>
        </section>

        <section class="output-panel">
          <h2>2. 添加到 posts/posts.json</h2>
          <p class="muted">把下面这一段放进数组最前面，逗号按 JSON 格式保留。</p>
          <textarea id="manifest-output" readonly></textarea>
        </section>
      </section>
    </main>

    <script>
      window.__BLOG_ADMIN_LOADED__ = false;
    </script>
    <script src="./assets/admin.js"></script>
    <script>
      if (!window.__BLOG_ADMIN_LOADED__) {
        document.write('<script src="./admin.js"><\\/script>');
      }
    </script>
  </body>
</html>
