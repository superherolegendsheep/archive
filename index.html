<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>superherolegendsheep的存档</title>
    <meta name="description" content="一个个人存档。" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="site-shell">
      <aside class="profile-panel" aria-label="简介">
        <div id="avatar" class="avatar" aria-hidden="true">文</div>
        <p class="eyebrow">lofter、微博、unifans同名</p>
        <h1 id="site-title">superherolegendsheep</h1>
        <p id="site-tagline" class="tagline">沪京/中美/安平</p>

        <button id="open-about" class="wide-button" type="button">完整身份页</button>
        <dl class="profile-list" id="profile-list"></dl>
        <nav class="profile-links" id="profile-links" aria-label="个人链接"></nav>
      </aside>

      <main class="content-panel">
        <section id="home-view">
          <header class="topbar">
            <div>
              <p class="eyebrow">Archive</p>
              <h2>作品与文章</h2>
            </div>
            <label class="search-box">
              <span>搜索</span>
              <input id="search-input" type="search" placeholder="标题、标签、作品集、正文" />
            </label>
          </header>

          <section class="collections-block" aria-label="作品集">
            <div class="section-heading">
              <p class="eyebrow">Collections</p>
              <h3>作品集</h3>
            </div>
            <div id="collection-list" class="collection-list"></div>
          </section>

          <section class="filter-bar" aria-label="筛选">
            <button class="tag-filter-button is-active" type="button" data-collection-filter="all">全部作品集</button>
            <button class="tag-filter-button is-active" type="button" data-tag-filter="all">全部标签</button>
            <div id="tag-filter-list" class="tag-filter-list"></div>
          </section>

          <section id="post-list" class="post-list" aria-live="polite"></section>

          <nav class="pagination" aria-label="分页">
            <button id="first-page" type="button">首页</button>
            <button id="prev-page" type="button">上一页</button>
            <span id="page-info" class="page-info">第 1 / 1 页</span>
            <button id="next-page" type="button">下一页</button>
            <button id="last-page" type="button">末页</button>
            <label class="jump-box">
              <span>跳转</span>
              <input id="page-jump" type="number" min="1" value="1" />
            </label>
            <button id="jump-button" type="button">前往</button>
          </nav>
        </section>

        <article id="reader" class="reader" hidden>
          <button id="close-reader" class="text-button" type="button">返回目录</button>
          <p id="reader-date" class="eyebrow"></p>
          <h2 id="reader-title"></h2>
          <div id="reader-body" class="reader-body"></div>
          <footer class="reader-footer">
            <div class="reader-actions">
              <button id="like-button" type="button">喜欢 0</button>
            </div>
            <div>
              <p class="eyebrow">Collection</p>
              <div id="reader-collection" class="reader-meta-row"></div>
            </div>
            <div>
              <p class="eyebrow">Tags</p>
              <div id="reader-tags" class="tag-row"></div>
            </div>
          </footer>
          <section class="comments">
            <h3>评论</h3>
            <div id="comments-box"></div>
            <form id="custom-comment-form" class="comment-form">
              <label>
                昵称
                <input id="comment-name" type="text" placeholder="可以填写笔名" />
              </label>
              <label>
                引用范围
                <input id="comment-quote" type="text" placeholder="可不引用；例如：第 3 段 / 某一句 / 章节名" />
              </label>
              <label>
                评论内容
                <textarea id="comment-body" placeholder="写下你的评论"></textarea>
              </label>
              <div class="comment-actions">
                <button id="send-comment-email" type="button">用邮件发送</button>
                <button id="send-comment-github" type="button">发送到 GitHub</button>
              </div>
              <p id="comment-help" class="muted"></p>
            </form>
          </section>
        </article>

        <article id="about-view" class="reader about-view" hidden>
          <p class="eyebrow">Identity</p>
          <h2 id="about-title">关于我</h2>
          <div id="about-body" class="reader-body"></div>
          <section class="collections-block about-collections" aria-label="关于页作品集">
            <div class="section-heading">
              <p class="eyebrow">Collections</p>
              <h3>作品集</h3>
            </div>
            <div id="about-collection-list" class="collection-list"></div>
          </section>
        </article>
      </main>
    </div>

    <script src="./site.config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
